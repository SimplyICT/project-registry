<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Switcher</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:20px;min-height:100vh}
.container{max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:8px}
h1{font-size:22px}
.info{font-size:12px;color:#8b949e;background:#161b22;padding:6px 12px;border-radius:6px;border:1px solid #30363d;display:flex;align-items:center;gap:8px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#3fb950}
.search-bar input{width:100%;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:15px;margin-bottom:16px;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:#58a6ff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card .top{display:flex;justify-content:space-between;margin-bottom:4px;align-items:flex-start}
.card .name{font-size:15px;font-weight:600;line-height:1.3}
.badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.badge-git{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.badge-mem{background:rgba(210,153,34,.15);color:#d29922;border:1px solid rgba(210,153,34,.3)}
.badge-srv{background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.2)}
.card .role{font-size:12px;color:#8b949e;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .bot{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;align-items:center}
.card .bot .path{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.count{font-size:12px;color:#8b949e;margin-bottom:10px}
.empty{text-align:center;padding:60px 20px;color:#8b949e;display:none}
.btn{background:#21262d;color:#e6edf3;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:#30363d;border-color:#58a6ff}
.btn-primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn-primary:hover{background:#388bfd}
.btn-term{background:#238636;border-color:#238636;color:#fff}
.btn-term:hover{background:#2ea043}
.btn-gh{background:#6e40c9;border-color:#6e40c9;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 18px;display:none;z-index:200;font-size:13px;max-width:90vw}
.toast.show{display:block}
.toast.error{border-color:#da3633;background:#2d1215}

/* Terminal view (full page takeover) */
.term-view{display:none;flex-direction:column;height:calc(100vh - 40px)}
.term-view.show{display:flex}
.term-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;flex-shrink:0}
.term-bar h2{font-size:16px}
.term-bar .status{font-size:12px;color:#8b949e}
#terminal-container{flex:1;min-height:0;border-radius:8px;overflow:hidden}
</style>
</head>
<body>
<div class=container id=mainView>
<header>
  <h1>Project Switcher</h1>
  <div class=info><span class=status-dot></span> <span id=server>loading...</span></div>
</header>
<div class=search-bar><input id=search placeholder="Search projects..." autofocus></div>
<div class=count id=count></div>
<div class=grid id=grid></div>
<div class=empty id=empty><p>No projects match your search</p></div>
<div class=toast id=toast></div>
</div>

<div class=term-view id=termView>
  <div class=term-bar>
    <h2><span id=termTitle></span></h2>
    <div>
      <span class=status id=termStatus>connecting...</span>
      <button class="btn btn-sm" id=btnCloseTerm style="margin-left:8px">Close Terminal</button>
    </div>
  </div>
  <div id=terminal-container></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
<script>
var data = null
var hasOpenCode = false
var termWsUrl = 'ws://' + location.hostname + ':8766'
var currentTerm = null
var currentWs = null

/* ── Project List ── */
async function load(){
  try{
    var r=await fetch('/api/projects'),d=await r.json()
    data=d.projects||[]
    hasOpenCode=d.has_opencode||false
    if(d.terminal_url) termWsUrl=d.terminal_url
    document.getElementById('server').textContent=location.hostname+' | '+data.length+' projects'
    render()
  }catch(e){
    document.getElementById('server').textContent='Error'
    toast('Failed: '+e.message,'error')
  }
}

function render(){
  var q=document.getElementById('search').value.toLowerCase()
  var f=data.filter(function(p){return p.name.toLowerCase().includes(q)||(p.role||'').toLowerCase().includes(q)})
  document.getElementById('empty').style.display=f.length?'none':'block'
  document.getElementById('count').textContent=f.length?'Showing '+f.length+' of '+data.length:''
  document.getElementById('grid').innerHTML=f.map(function(p){
    return '<div class=card data-name="'+esc(p.name)+'">'
      +'<div class=top><div class=name>'+esc(p.name)+'</div><div class=badges>'
      +(p.hasGit?'<span class="badge badge-git">git</span>':'')
      +(p.hasMemory?'<span class="badge badge-mem">mem</span>':'')
      +'<span class="badge badge-srv">'+esc(p.server||'')+'</span>'
      +'</div></div>'
      +(p.role?'<div class=role>'+esc(p.role)+'</div>':'<div class=role style=visibility:hidden>-</div>')
      +'<div class=bot><span class=path>'+esc(p.path)+'</span> <span>&rarr;</span></div></div>'
  }).join('')
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}

function toast(m,cls){
  var t=document.getElementById('toast')
  t.textContent=m;t.className='toast show'+(cls?' '+cls:'')
  clearTimeout(t._);t._=setTimeout(function(){t.className='toast'},4000)
}

/* ── Terminal ── */
function openTerminal(name){
  var tv=document.getElementById('termView')
  var mv=document.getElementById('mainView')
  mv.style.display='none'
  tv.classList.add('show')
  document.getElementById('termTitle').textContent=name
  document.getElementById('termStatus').textContent='connecting...'
  document.getElementById('termStatus').style.color='#8b949e'
  document.getElementById('btnCloseTerm').onclick=closeTerminal

  var container=document.getElementById('terminal-container')
  container.innerHTML=''

  var term=new Terminal({cursorBlink:true,fontSize:14,theme:{background:'#0d1117',foreground:'#e6edf3',cursor:'#58a6ff',selection:'rgba(88,166,255,0.3)'}})
  var fitAddon=new FitAddon.FitAddon()
  term.loadAddon(fitAddon)
  term.open(container)
  fitAddon.fit()

  currentTerm=term

  var ws=new WebSocket(termWsUrl)
  currentWs=ws

  ws.onopen=function(){
    document.getElementById('termStatus').textContent='connected'
    document.getElementById('termStatus').style.color='#3fb950'
    ws.send(JSON.stringify({name:name,cols:term.cols,rows:term.rows}))
  }

  ws.onmessage=function(e){
    if(e.data instanceof Blob){
      var r=new FileReader()
      r.onload=function(){term.write(r.result)}
      r.readAsArrayBuffer(e.data)
    }else{
      term.write(e.data)
    }
  }

  ws.onclose=function(){
    document.getElementById('termStatus').textContent='disconnected'
    document.getElementById('termStatus').style.color='#da3633'
    currentWs=null
  }

  ws.onerror=function(){
    document.getElementById('termStatus').textContent='connection failed'
    document.getElementById('termStatus').style.color='#da3633'
  }

  term.onData(function(d){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(d)})
  term.onResize(function(sz){if(ws&&ws.readyState===WebSocket.OPEN)ws.send('resize:'+sz.cols+','+sz.rows)})

  window.addEventListener('resize',function(){fitAddon.fit()})
}

function closeTerminal(){
  if(currentWs){currentWs.close();currentWs=null}
  if(currentTerm){currentTerm.dispose();currentTerm=null}
  document.getElementById('termView').classList.remove('show')
  document.getElementById('mainView').style.display='block'
}

/* ── Card click — opens terminal directly ── */
document.getElementById('grid').addEventListener('click',function(e){
  var c=e.target.closest('.card')
  if(c)openTerminal(c.dataset.name)
})

document.getElementById('search').addEventListener('input',render)
load()
</script>
</body>
</html>
